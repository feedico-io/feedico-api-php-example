name: Set repository metadata

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  administration: write
  contents: read

jobs:
  metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Configure description, homepage, and topics
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }} -X PATCH \
            -f description='PHP starter: fetch Feedico affiliate merchants and coupon codes via REST API. Docs: feedico.io/docs' \
            -f homepage='https://feedico.io'
          gh api repos/${{ github.repository }}/topics -X PUT \
            -f names='["feedico","coupon-api","affiliate-api","merchants","coupons","rest-api","php","api-example","affiliate-marketing","publisher-api"]'
